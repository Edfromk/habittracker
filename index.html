<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Habit Tracker</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-color: #eef7f0;
    background-image: url('https://images.pexels.com/photos/957024/vegetation-grass-bill-957024.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: 0.3s;
}

.container {
    display: flex;
    height: 100vh;
}

.left {
    flex: 1;
    padding: 20px;
}

.panel {
    background: white;
    padding: 20px;
    border-radius: 10px;
}

.right {
    width: 320px;
    background: white;
    padding: 15px;
    border-left: 1px solid #ddd;
}

/* calendar */
.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    font-size: 12px;
}

.day {
    padding: 6px;
    text-align: center;
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    background: white;
}

.day:hover {
    background: #d1fae5;
}

.selected {
    background: #16a34a;
    color: white;
}

.has-record {
    background: #fee2e2;
}

.count-badge {
    position: absolute;
    bottom: 2px;
    right: 4px;
    font-size: 10px;
    text-align: right;
}

.weed { color: green; }
.water { color: blue; }

/* records */
.record {
    margin-top: 8px;
    padding: 8px;
    background: #f0fdf4;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
}

.delete {
    cursor: pointer;
    color: red;
}

/* button */
button {
    background: #16a34a;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
}

.timer {
    margin-top: 10px;
    padding: 10px;
    background: #022c22;
    color: #4ade80;
    font-family: monospace;
    border-radius: 6px;
}

/* 🌗 theme toggle */
.theme-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    background: #16a34a;
    color: white;
    border: none;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    z-index: 999;
}

/* 🌙 dark mode */
.dark body {
    background: #111;
    background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://images.pexels.com/photos/957024/vegetation-grass-bill-957024.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.dark .panel,
.dark .right {
    background: #1e1e1e;
    color: #eee;
}

.dark .day {
    background: #2a2a2a;
}

.dark .has-record {
    background: #7f1d1d;
}

.dark .record {
    background: #1f2937;
}

.dark .timer {
    background: #000;
    color: #22c55e;
}
</style>
</head>

<body>

<button id="themeToggle" class="theme-btn">🌙</button>

<div class="container">

<div class="left">
<div class="panel">

<h2 id="selectedDate">Select a Date</h2>

<label>Type:</label>
<select id="type">
<option value="weed">🌿 Weed</option>
<option value="water">💧 Water</option>
</select>

<br><br>

<label>Time:</label>
<select id="hour"></select> :
<select id="minute"></select>

<br><br>

<label>Count:</label>
<input type="number" id="count" value="1" min="1">

<br><br>

<button onclick="saveRecord()">Save</button>

<hr>

<h3>Records</h3>
<div id="records"></div>

<div class="timer" id="weedTimer"></div>
<div class="timer" id="waterTimer"></div>

</div>
</div>

<div class="right">
<select id="monthSelect"></select>
<h3 id="monthTitle"></h3>
<div class="calendar" id="calendar"></div>
</div>

</div>

<script>

// time dropdown
for (let h=0; h<24; h++) hour.innerHTML += `<option value="${h}">${h}</option>`;
for (let m=0; m<60; m+=5) minute.innerHTML += `<option value="${m}">${m.toString().padStart(2,'0')}</option>`;

// state
let selectedDate=null;
let currentYear=new Date().getFullYear();
let currentMonth=new Date().getMonth();

// month dropdown
for (let i=0;i<12;i++){
    let o=document.createElement("option");
    o.value=i; o.textContent=i+1;
    if(i===currentMonth) o.selected=true;
    monthSelect.appendChild(o);
}

monthSelect.onchange=()=>{
    currentMonth=parseInt(monthSelect.value);
    generateCalendar();
};

// calendar
function generateCalendar(){
    calendar.innerHTML="";
    monthTitle.textContent=`${currentYear} / ${currentMonth+1}`;

    let first=new Date(currentYear,currentMonth,1).getDay();
    let last=new Date(currentYear,currentMonth+1,0).getDate();
    let data=JSON.parse(localStorage.getItem("logs")||"{}");

    for(let i=0;i<first;i++) calendar.innerHTML+="<div></div>";

    for(let d=1;d<=last;d++){
        let key=`${currentYear}-${currentMonth+1}-${d}`;
        let div=document.createElement("div");
        div.className="day";
        div.textContent=d;

        if(data[key]){
            let weed=0, water=0;

            data[key].forEach(r=>{
                if(r.type==="weed") weed+=Number(r.count);
                if(r.type==="water") water+=Number(r.count);
            });

            if(weed>0 || water>0){
                div.classList.add("has-record");

                let badge=document.createElement("div");
                badge.className="count-badge";
                badge.innerHTML=`
                <span class="weed">${weed}</span><br>
                <span class="water">${water}</span>
                `;
                div.appendChild(badge);
            }
        }

        div.onclick=()=>selectDate(key,div);
        calendar.appendChild(div);
    }
}

// select
function selectDate(date,el){
    document.querySelectorAll(".day").forEach(d=>d.classList.remove("selected"));
    el.classList.add("selected");

    selectedDate=date;
    selectedDateText.textContent=date;
    loadRecords();
}

// save
function saveRecord(){
    if(!selectedDate){alert("Select a date");return;}

    let data=JSON.parse(localStorage.getItem("logs")||"{}");
    if(!data[selectedDate]) data[selectedDate]=[];

    let time=`${hour.value}:${minute.value.padStart(2,'0')}`;

    data[selectedDate].push({
        type:type.value,
        time,
        count:count.value
    });

    localStorage.setItem("logs",JSON.stringify(data));

    loadRecords();
    generateCalendar();
    updateTimers();
}

// delete
function deleteRecord(i){
    let data=JSON.parse(localStorage.getItem("logs")||"{}");

    data[selectedDate].splice(i,1);

    if(data[selectedDate].length===0){
        delete data[selectedDate];
    }

    localSstringify(data));

    loadRecords();
    generateCalendar();
}

// records
function loadRecords(){
    records.innerHTML="";
    let data=JSON.parse(localStorage.getItem("logs")||"{}");
    let list=data[selectedDate]||[];

    list.forEach((r,i)=>{
        let icon = r.type==="weed" ? "🌿" : "💧";

        let el=document.createElement("div");
        el.className="record";
        el.innerHTML=`
        <span>${icon} ${r.time} - ${r.count}</span>
        <span class="delete" onclick="deleteRecord(${i})">❌</span>
        `;
        records.appendChild(el);
    });
}

// last time
function getLast(type){
    let data=JSON.parse(localStorage.getItem("logs")||"{}");
    let latest=null;

    for(let d in data){
        data[d].forEach(r=>{
            if(r.type===type){
                let [y,m,day]=d.split("-").map(Number);
                let [h,min]=r.time.split(":").map(Number);
                let dt=new Date(y,m-1,day,h,min);
                if(!latest||dt>latest) latest=dt;
            }
        });
    }
    return latest;
}

// timers
function updateTimers(){
    updateTimer("weed","weedTimer","🌿");
    updateTimer("water","waterTimer","💧");
}

function updateTimer(type,id,icon){
    let el=document.getElementById(id);
    let last=getLast(type);

    if(!last){el.textContent=`${icon} No records`;return;}

    let diff=new Date()-last;
    let d=Math.floor(diff/(1000*60*60*24));
    let h=Math.floor(diff/(1000*60*60))%24;
    let m=Math.floor(diff/(1000*60))%60;

    el.textContent=`${icon} Last used: ${d}d ${h}h ${m}m ago`;
}

setInterval(updateTimers,1000);

// 🌗 theme toggle
const toggle = document.getElementById("themeToggle");

if(localStorage.getItem("theme")==="dark"){
    document.documentElement.classList.add("dark");
    toggle.textContent="🌞";
}

toggle.onclick=()=>{
    document.documentElement.classList.toggle("dark");

    if(document.documentElement.classList.contains("dark")){
        localStorage.setItem("theme","dark");
        toggle.textContent="🌞";
    }else{
        localStorage.setItem("theme","light");
        toggle.textContent="🌙";
    }
};

// init
generateCalendar();
updateTimers();

</script>

</body>
</html>
