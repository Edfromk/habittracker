<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Habit Tracker</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background:
        linear-gradient(rgba(8, 28, 14, 0.5), rgba(8, 28, 14, 0.5)),
        url('https://static.vecteezy.com/system/resources/previews/072/133/246/non_2x/a-misty-forest-path-winds-through-lush-green-vegetation-and-moss-covered-rocks-with-tall-trees-in-the-background-free-photo.jpeg') center / cover fixed no-repeat;
    background-color: #14361d;
    transition: 0.3s;
}

.container {
    display: flex;
    height: 100vh;
}

.left {
    flex: 1;
    padding: 20px;
}

.panel {
    background: linear-gradient(to bottom, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.08));
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.28);
    box-shadow: 0 12px 30px rgba(4, 20, 8, 0.16);
    padding: 20px;
    border-radius: 10px;
}

.right {
    width: 320px;
    background: linear-gradient(to bottom, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.08));
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-left: 1px solid rgba(255, 255, 255, 0.22);
    box-shadow: 0 12px 30px rgba(4, 20, 8, 0.16);
    padding: 15px;
}

/* calendar */
.calendar-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 6px;
    font-size: 11px;
}

.weekday {
    padding: 4px 0;
    text-align: center;
    color: #000000;
    font-weight: 700;
    letter-spacing: 0.04em;
}

.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    font-size: 12px;
}

.day {
    padding: 6px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    background: linear-gradient(to bottom, rgba(255, 255, 255, 0.56), rgba(255, 255, 255, 0.18));
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: #17341f;
    font-weight: 700;
}

.day:hover {
    background: linear-gradient(to bottom, rgba(255, 255, 255, 0.68), rgba(209, 250, 229, 0.28));
}

.selected {
    background: #16a34a;
    color: white;
}

.has-record {
    background: #fee2e2;
}

.special-day {
    background: linear-gradient(to bottom, rgba(74, 222, 128, 0.95), rgba(22, 163, 74, 0.95));
    border-color: rgba(22, 101, 52, 0.42);
    color: #f0fdf4;
    font-weight: 700;
    box-shadow: 0 10px 20px rgba(21, 128, 61, 0.24);
}

.special-day:hover {
    background: linear-gradient(to bottom, rgba(110, 231, 183, 0.98), rgba(22, 163, 74, 0.98));
}

.special-day .weed,
.special-day .water,
.special-day .count-badge {
    color: #f0fdf4;
}

.count-badge {
    position: absolute;
    bottom: 2px;
    right: 4px;
    font-size: 10px;
    text-align: right;
}

.weed { color: green; }
.water { color: blue; }

/* records */
.record {
    margin-top: 8px;
    padding: 8px;
    background: #f0fdf4;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
}

.delete {
    cursor: pointer;
    color: red;
}

/* button */
button {
    background:
        linear-gradient(to bottom, rgba(255, 255, 255, 0.34) 0%, rgba(255, 255, 255, 0.12) 32%, rgba(255, 255, 255, 0) 33%),
        linear-gradient(to bottom, rgba(22, 163, 74, 0.96), rgba(8, 95, 39, 0.92));
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: white;
    border: 1px solid rgba(187, 247, 208, 0.38);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3), 0 14px 30px rgba(3, 22, 9, 0.42);
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
}

button:hover {
    background:
        linear-gradient(to bottom, rgba(255, 255, 255, 0.42) 0%, rgba(255, 255, 255, 0.16) 34%, rgba(255, 255, 255, 0) 35%),
        linear-gradient(to bottom, rgba(34, 197, 94, 0.98), rgba(10, 110, 46, 0.95));
    transform: translateY(-2px);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.34), 0 20px 38px rgba(3, 22, 9, 0.5);
}

button:active {
    transform: translateY(0);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22), 0 8px 18px rgba(3, 22, 9, 0.28);
}

select,
input[type="number"] {
    background: linear-gradient(to bottom, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.08));
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: #17341f;
    border-radius: 8px;
    padding: 7px 10px;
}

.timer {
    margin-top: 10px;
    padding: 10px;
    background-color: #022c22;
    color: #4ade80;
    font-family: monospace;
    border-radius: 6px;
    background-size: cover;
    background-position: center;
}

.timer.no-records {
    color: white !important;
    text-shadow: 1px 1px 3px black;
    font-weight: bold;
}

#weedTimer.no-records {
    background-image: 
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url('https://upload.wikimedia.org/wikipedia/commons/5/5e/Bob_Marley_1977_press_photo.jpg');
}

#waterTimer.no-records {
    background-image: 
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url('https://upload.wikimedia.org/wikipedia/commons/b/b1/Billy_Herrington.jpg');
}

/* 🌗 theme toggle */
.theme-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    background: #16a34a;
    color: white;
    border: none;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    z-index: 999;
}

/* 🌙 dark mode */
.dark body {
    background: #111;
}

.dark .panel,
.dark .right {
    background: #1e1e1e;
    color: #eee;
}

.dark select,
.dark input[type="number"] {
    color: #4ade80;
    background: #2a2a2a;
}

.dark .day {
    background: #2a2a2a;
    color: #4ade80;
}

.dark .weekday {
    color: #4ade80;
}

.dark .has-record {
    background: #7f1d1d;
}

.dark .special-day {
    background: linear-gradient(to bottom, rgba(34, 197, 94, 0.95), rgba(21, 128, 61, 0.95));
    color: #f0fdf4;
}

.dark .record {
    background: #1f2937;
}

.dark .timer {
    background-color: #000;
    color: #22c55e;
}
</style>
</head>

<body>

<button id="themeToggle" class="theme-btn">🌙</button>

<div class="container">

<div class="left">
<div class="panel">

<h2 id="selectedDate">Select a Date</h2>

<label>Type:</label>
<select id="type">
<option value="weed">🌿 Smoke grass</option>
<option value="water">💧 Drink water</option>
</select>

<br><br>

<label>Time:</label>
<select id="hour"></select> :
<select id="minute"></select>

<br><br>

<label>Count:</label>
<input type="number" id="count" value="1" min="1">

<br><br>

<button onclick="saveRecord()">Save</button>

<hr>

<h3>Records</h3>
<div id="records"></div>

<div class="timer" id="weedTimer"></div>
<div class="timer" id="waterTimer"></div>

</div>
</div>

<div class="right">
<select id="monthSelect"></select>
<h3 id="monthTitle"></h3>
<div class="calendar-weekdays" id="calendarWeekdays"></div>
<div class="calendar" id="calendar"></div>
</div>

</div>

<script>

// time dropdown
const hour = document.getElementById("hour");
const minute = document.getElementById("minute");
for (let h=0; h<24; h++) hour.innerHTML += `<option value="${h}">${h}</option>`;
for (let m=0; m<60; m+=5) minute.innerHTML += `<option value="${m}">${m.toString().padStart(2,'0')}</option>`;

// state
let selectedDate=null;
let currentYear=new Date().getFullYear();
let currentMonth=new Date().getMonth();
const monthLabels = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

// month dropdown
const monthSelect = document.getElementById("monthSelect");
for (let i=0;i<12;i++){
    let o=document.createElement("option");
    o.value=i; o.textContent=monthLabels[i];
    if(i===currentMonth) o.selected=true;
    monthSelect.appendChild(o);
}

monthSelect.onchange=()=>{
    currentMonth=parseInt(monthSelect.value);
    generateCalendar();
};


// calendar
const calendarWeekdays = document.getElementById("calendarWeekdays");
const weekdayLabels = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
calendarWeekdays.innerHTML = weekdayLabels
    .map((label) => `<div class="weekday">${label}</div>`)
    .join("");

const calendar = document.getElementById("calendar");
const monthTitle = document.getElementById("monthTitle");
function generateCalendar(){
    calendar.innerHTML="";
    monthTitle.textContent=`${currentYear} / ${monthLabels[currentMonth]}`;

    let first=new Date(currentYear,currentMonth,1).getDay();
    let last=new Date(currentYear,currentMonth+1,0).getDate();
    let data=JSON.parse(localStorage.getItem("logs")||"{}");

    for(let i=0;i<first;i++) calendar.innerHTML+="<div></div>";

    for(let d=1;d<=last;d++){
        let key=`${currentYear}-${currentMonth+1}-${d}`;
        let div=document.createElement("div");
        div.className="day";
        div.textContent=d;

        if(currentMonth===3 && d===20){
            div.classList.add("special-day");
        }

        if(data[key]){
            let weed=0, water=0;

            data[key].forEach(r=>{
                if(r.type==="weed") weed+=Number(r.count);
                if(r.type==="water") water+=Number(r.count);
            });

            if(weed>0 || water>0){
                div.classList.add("has-record");

                let badge=document.createElement("div");
                badge.className="count-badge";
                badge.innerHTML=`
                <span class="weed">${weed}</span><br>
                <span class="water">${water}</span>
                `;
                div.appendChild(badge);
            }
        }

        div.onclick=()=>selectDate(key,div);
        calendar.appendChild(div);
    }
}

// select
const selectedDateText = document.getElementById("selectedDate");
function selectDate(date,el){
    document.querySelectorAll(".day").forEach(d=>d.classList.remove("selected"));
    el.classList.add("selected");

    selectedDate=date;
    selectedDateText.textContent=date;
    loadRecords();
}

// save
const type = document.getElementById("type");
const count = document.getElementById("count");
function saveRecord(){
    if(!selectedDate){alert("Select a date");return;}

    let data=JSON.parse(localStorage.getItem("logs")||"{}");
    if(!data[selectedDate]) data[selectedDate]=[];

    let time=`${hour.value}:${minute.value.padStart(2,'0')}`;

    data[selectedDate].push({
        type:type.value,
        time,
        count:count.value
    });

    localStorage.setItem("logs",JSON.stringify(data));

    loadRecords();
    generateCalendar();
    updateTimers();
}

// delete
function deleteRecord(i){
    let data=JSON.parse(localStorage.getItem("logs")||"{}");

    data[selectedDate].splice(i,1);

    if(data[selectedDate].length===0){
        delete data[selectedDate];
    }

    localStorage.setItem("logs",JSON.stringify(data));

    loadRecords();
    generateCalendar();
    updateTimers();
}

// records
const records = document.getElementById("records");
function loadRecords(){
    records.innerHTML="";
    let data=JSON.parse(localStorage.getItem("logs")||"{}");
    let list=data[selectedDate]||[];

    list.forEach((r,i)=>{
        let icon = r.type==="weed" ? "🌿" : "💧";

        let el=document.createElement("div");
        el.className="record";
        el.innerHTML=`
        <span>${icon} ${r.time} - ${r.count}</span>
        <span class="delete" onclick="deleteRecord(${i})">❌</span>
        `;
        records.appendChild(el);
    });
}

// last time
function getLast(type){
    let data=JSON.parse(localStorage.getItem("logs")||"{}");
    let latest=null;

    for(let d in data){
        data[d].forEach(r=>{
            if(r.type===type){
                let [y,m,day]=d.split("-").map(Number);
                let [h,min]=r.time.split(":").map(Number);
                let dt=new Date(y,m-1,day,h,min);
                if(!latest||dt>latest) latest=dt;
            }
        });
    }
    return latest;
}

// timers
function updateTimers(){
    updateTimer("weed","weedTimer","🌿");
    updateTimer("water","waterTimer","💧");
}

function updateTimer(type,id,icon){
    let el=document.getElementById(id);
    let last=getLast(type);

    if(!last){
        el.textContent=`${icon} No records`;
        el.classList.add("no-records");
        return;
    }
    
    el.classList.remove("no-records");

    let diff=new Date()-last;
    let d=Math.floor(diff/(1000*60*60*24));
    let h=Math.floor(diff/(1000*60*60))%24;
    let m=Math.floor(diff/(1000*60))%60;

    el.textContent=`${icon} Last used: ${d}d ${h}h ${m}m ago`;
}

setInterval(updateTimers,1000);

// 🌗 theme toggle
const toggle = document.getElementById("themeToggle");

if(localStorage.getItem("theme")==="dark"){
    document.documentElement.classList.add("dark");
    toggle.textContent="🌞";
}

toggle.onclick=()=>{
    document.documentElement.classList.toggle("dark");

    if(document.documentElement.classList.contains("dark")){
        localStorage.setItem("theme","dark");
        toggle.textContent="🌞";
    }else{
        localStorage.setItem("theme","light");
        toggle.textContent="🌙";
    }
};

// init
generateCalendar();
updateTimers();

</script>

</body>
</html>
