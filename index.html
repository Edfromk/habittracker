<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Habit Tracker</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<button id="accountToggle" class="account-btn" title="Account Settings" aria-label="Account Settings"></button>
<button id="themeToggle" class="theme-btn">☾</button>

<div id="mainPage">
    <div class="container">

    <div class="left">
    <div class="panel">

    <h2 id="selectedDate">Select a Date</h2>

    <label>Type:</label>
    <select id="type">
    <option value="weed">🌿 Smoke grass</option>
    <option value="water">💧 Drink water</option>
    </select>

    <br><br>

    <label>Time:</label>
    <select id="hour"></select> :
    <select id="minute"></select>

    <br><br>

    <label>Count:</label>
    <input type="number" id="count" value="1" min="1">

    <br><br>

    <button onclick="saveRecord()">Save</button>

    <hr>

    <div class="records-header">
    <h3>Records</h3>
    <div id="weeklySummary" class="weekly-summary"></div>
    </div>
    <div id="records"></div>

    <div class="timer" id="weedTimer"></div>
    <div class="timer" id="waterTimer"></div>

    </div>
    </div>

    <div class="right">
    <select id="monthSelect"></select>
    <h3 id="monthTitle"></h3>
    <div class="calendar-weekdays" id="calendarWeekdays"></div>
    <div class="calendar" id="calendar"></div>
    </div>

    </div>
</div>

<div id="accountPage">
    <div class="panel">
        <h2>Account Settings</h2>
        <label>Name:</label>
        <input type="text" id="accName" placeholder="Enter your name">
        
        <label>Email:</label>
        <input type="email" id="accEmail" placeholder="Enter your email">
        
        <br>
        <button onclick="saveAccountInfo()">Save Profile</button>
        <button onclick="toggleAccountView()" style="background: #374151;">Back to Tracker</button>
    </div>
</div>

<script src="main.js"></script>

</body>
</html>
